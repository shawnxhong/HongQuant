services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hongquant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hongquant}
      POSTGRES_DB: ${POSTGRES_DB:-hongquant}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hongquant}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-hongquant}:${POSTGRES_PASSWORD:-hongquant}@postgres:5432/${POSTGRES_DB:-hongquant}
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_URL: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4200:4200"

volumes:
  pgdata:
